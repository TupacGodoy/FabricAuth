##                          ##
##         EasyAuth         ##
##  Storage Configuration   ##
##                          ##

# Database type. Can be "sqlite", "mysql" or "mongodb". SQLite is set by default.
database-type: ${databaseType}

# Note: If your string contains special characters, you should enclose it in double quotes.

sqlite: {
  # SQLite database path
  sqlite-path: ${sqlite.path}

  # SQLite table name
  sqlite-table: ${sqlite.table}
}

mysql: {
  # MySQL host
  mysql-host: ${mySql.host}

  # MySQL user
  mysql-user: ${mySql.user}

  # MySQL password
  mysql-password: ${mySql.password}

  # MySQL database
  mysql-database: ${mySql.database}

  # MySQL table name
  mysql-table: ${mySql.table}
}

mongodb: {
  # MongoDB connection string
  mongodb-connection-string: ${mongoDB.connectionString}

  # MongoDB database name
  mongodb-database: ${mongoDB.database}
}

# Deprecated, left for compatibility
use-simpleauth-db: ${useSimpleAuthDb}
